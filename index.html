<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em-jay A. Nerizon — Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f0ede4;
            --bg-grid: #e8e4d8;
            --card-bg: #ffffff;
            --card-border: #2a2a2a;
            --text: #1a1a1a;
            --text-muted: #6b6b6b;
            --orange: #c94a0c;
            --teal: #1a5c4a;
            --font: 'Outfit', Georgia, serif;
        }

        body {
            font-family: var(--font);
            background-color: var(--bg);
            background-image:
                linear-gradient(var(--bg-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
            background-size: 28px 28px;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            padding: 48px 56px;
            max-width: 520px;
            width: 90%;
            position: relative;
            text-align: center;
        }

        .card-label {
            position: absolute;
            top: -1px;
            left: -1px;
            font-family: var(--font);
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 3px 10px;
            border: 2px solid var(--card-border);
            border-radius: 0;
        }

        .label-orange { background: var(--orange); color: #fff; border-color: var(--orange); }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: var(--text);
            color: var(--card-bg);
            font-size: 1.8rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            border: 2px solid var(--card-border);
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--orange);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.65;
            margin-bottom: 36px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--orange);
            color: #fff;
            border: 2px solid var(--card-border);
            font-family: var(--font);
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 14px 32px;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.15s, background 0.15s;
        }

        .btn:hover {
            background: #a33a08;
            transform: translate(2px, 2px);
        }

        .btn-arrow {
            font-size: 1.1rem;
            transition: transform 0.2s;
        }

        .btn:hover .btn-arrow {
            transform: translateX(4px);
        }

        .divider {
            width: 40px;
            height: 2px;
            background: var(--card-border);
            margin: 28px auto 0;
        }

        .version-tag {
            margin-top: 16px;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .version-tag span {
            color: var(--teal);
        }
    </style>
</head>
<body>

    <div class="card">
        <span class="card-label label-orange">Portfolio</span>

        <div class="logo-icon">E</div>

        <h1>Em-jay A. Nerizon</h1>
        <p class="subtitle">Web Developer &nbsp;·&nbsp; Full-Stack</p>

        <p class="desc">
            Welcome! Click below to view the latest version of my portfolio — built with a neo-brutalist console UI aesthetic.
        </p>

        <a href="v3/index.html" class="btn">
            View Portfolio
            <span class="btn-arrow">&#8250;</span>
        </a>

        <div class="divider"></div>
        <p class="version-tag">Version <span>v3</span> &mdash; 2026</p>
    </div>

</body>
</html>
